title: turnstile via batch/streaming mode — NDJSON in, NDJSON out (SPEC §13.7)
# One `determa-state run -` process consumes NDJSON argv lines from stdin and emits one
# NDJSON result object per line. `stream` is compared structurally, line by line.
# A failing line (here: send to a missing instance) does NOT abort the stream;
# the process exit code is the first non-zero line exit (§13.7).
steps:
  - run: [run, -]
    stdin:
      - [new, t1, machine.yaml]
      - [send, t1, coin, --payload, "amount=100"]   # covers the fare -> unlocks
      - [send, missing, push]                        # not found -> exit 4, stream continues
      - [state, t1]                                  # proves the stream kept going
      - [list]
    expect:
      exit: 4
      stream:
        - { ok: true,  exit: 0, result: { instance: t1, def: "turnstile@1", status: active, config: [locked], esvs: { fare: 50 } } }
        - { ok: true,  exit: 0, result: { instance: t1, status: active, config: [unlocked], published: [] } }
        - { ok: false, exit: 4, result: null }
        - { ok: true,  exit: 0, result: { instance: t1, status: active, config: [unlocked] } }
        - { ok: true,  exit: 0, result: [ { id: t1, def: "turnstile@1", parent: null, status: active, config: [unlocked] } ] }
