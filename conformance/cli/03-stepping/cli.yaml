title: step-by-step execution + introspection — manual mode, send/inspect/step (SPEC §14)
# One `determa-state run -` process holds the in-memory queue between steps. Switching to
# manual mode makes `send` enqueue without processing; `inspect` shows the pending
# queue; `step` advances exactly one RTC step. `stream` is compared structurally.
steps:
  - run: [run, -]
    stdin:
      - [new, t1, machine.yaml]
      - [mode, manual]
      - [send, t1, coin, --payload, "amount=100"]   # enqueued, NOT processed -> still locked
      - [inspect, t1]                                # queue non-empty, config unchanged
      - [step, t1, --steps, "1"]                       # one RTC step -> unlocked, queue drained
      - [mode, auto]                                 # back to auto processing
    expect:
      exit: 0
      stream:
        - { ok: true, exit: 0, result: { instance: t1, definition: "turnstile@1", status: active, config: [locked], esvs: { fare: 50 } } }
        - { ok: true, exit: 0, result: { mode: manual } }
        - { ok: true, exit: 0, result: { instance: t1, status: active, config: [locked] } }
        - { ok: true, exit: 0, result: { instance: t1, status: active, config: [locked], queue: [{ type: coin }] } }
        - { ok: true, exit: 0, result: { instance: t1, status: active, config: [unlocked] } }
        - { ok: true, exit: 0, result: { mode: auto } }
