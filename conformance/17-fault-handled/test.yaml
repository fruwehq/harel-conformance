title: an action fault aborts the step atomically and delivers the `error` event
steps:
  # the action errors (x / 0): the step is aborted (x unchanged), boom is dead-lettered,
  # and the reserved `error` event is delivered and handled -> recovered.
  - send: { event: boom }
    expect:
      config: [recovered]
      status: active
      esvs: { x: 7 }
      dead_letter: true
