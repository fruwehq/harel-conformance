id: guardlist
events:
  check: { payload: { n: { type: int, required: true } } }
  reset: {}
top:
  initial: { transition_to: start }
  states:
    start:
      on_events:
        check:                                              # first passing guard wins
          - { guard: "event.payload.n > 10", transition_to: high }
          - { guard: "event.payload.n > 0",  transition_to: low }
          - { transition_to: zero }                         # else (no guard)
    high:
      on_events: { reset: { transition_to: start } }
    low:
      on_events: { reset: { transition_to: start } }
    zero:
      on_events: { reset: { transition_to: start } }
