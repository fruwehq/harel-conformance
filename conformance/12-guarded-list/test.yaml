title: a guarded transition list picks the first passing guard, else the unguarded one
steps:
  - send: { event: check, payload: { n: 5 } }    # >10 no, >0 yes -> low
    expect: { config: [low] }
  - send: { event: reset }
    expect: { config: [start] }

  - send: { event: check, payload: { n: 50 } }   # >10 yes -> high
    expect: { config: [high] }
  - send: { event: reset }
    expect: { config: [start] }

  - send: { event: check, payload: { n: 0 } }    # neither guard -> else -> zero
    expect: { config: [zero] }
