id: prov
contracts: [prov_contract]
events:
  configure: {}
  make: {}
top:
  initial: { transition_to: unconfigured }
  states:
    unconfigured:
      on_events:
        configure: { transition_to: ready }
    ready:
      on_events:
        make:
          action: [ { spawn: { def: worker } } ]

---

id: worker
top:
  initial: { transition_to: w }
  states:
    w: {}
