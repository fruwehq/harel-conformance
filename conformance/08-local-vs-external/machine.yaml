id: localext
events:
  loc: {}
  ext: {}
top:
  esvs:
    trail: { type: list, init: [] }
  initial: { transition_to: c }
  states:
    c:
      type: composite
      entry: [ { assign: { trail: "trail + ['enterC']" } } ]
      exit:  [ { assign: { trail: "trail + ['exitC']" } } ]
      initial: { transition_to: a }
      on_events:
        loc: { transition_to: c.a, local: true }   # local: does not exit/re-enter c
        ext: { transition_to: c.a }                 # external self: exits + re-enters c
      states:
        a:
          entry: [ { assign: { trail: "trail + ['enterA']" } } ]
          exit:  [ { assign: { trail: "trail + ['exitA']" } } ]
