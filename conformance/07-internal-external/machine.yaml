id: intext
events:
  tick: {}
  swap: {}
top:
  esvs:
    trail: { type: list, init: [] }   # records entry/exit order
  initial: { transition_to: a }
  states:
    a:
      entry: [ { assign: { trail: "trail + ['enterA']" } } ]
      exit:  [ { assign: { trail: "trail + ['exitA']" } } ]
      on_events:
        tick: { action: [ { assign: { trail: "trail + ['tick']" } } ] }   # internal
        swap: { transition_to: b }                                         # external
    b:
      entry: [ { assign: { trail: "trail + ['enterB']" } } ]
