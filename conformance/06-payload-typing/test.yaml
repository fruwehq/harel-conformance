title: event payloads are typed — valid accepted, invalid/undeclared rejected
steps:
  # well-typed payload is accepted and applied.
  - send: { event: set, payload: { n: 5 } }
    expect:
      config: [s]
      esvs: { n: 5 }

  # wrong type -> rejected at delivery, not enqueued; state unchanged.
  - send: { event: set, payload: { n: "oops" } }
    expect:
      rejected: true
      esvs: { n: 5 }

  # missing required field -> rejected.
  - send: { event: set, payload: {} }
    expect:
      rejected: true
      esvs: { n: 5 }

  # undeclared event -> rejected.
  - send: { event: bogus }
    expect:
      rejected: true
      esvs: { n: 5 }
