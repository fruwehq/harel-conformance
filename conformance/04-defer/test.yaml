title: a deferred event is held, then replayed on the state change that un-defers it
steps:
  # `closed` defers q -> it is held in the deferred set, not handled, state unchanged.
  - send: { event: q }
    expect:
      config: [closed]
      esvs: { seen: 0 }

  # open -> closed transitions to ready; the config change un-defers q, which is
  # reinserted at the front and handled in `ready` (seen += 1). No busy-loop.
  - send: { event: open }
    expect:
      config: [ready]
      esvs: { seen: 1 }
