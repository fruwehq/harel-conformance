id: defertest
events:
  q: {}
  open: {}
top:
  esvs:
    seen: { type: int, init: 0 }
  initial: { transition_to: closed }
  states:
    closed:
      defer: [q]
      on_events:
        open: { transition_to: ready }
    ready:
      on_events:
        q:
          action: [ { assign: { seen: "seen + 1" } } ]   # internal
