title: state survives serialize/reload between every step (config, esvs, deferred, timers)
roundtrip: true        # harness snapshots + reloads every instance between steps
steps:
  - send: { event: enter }       # a -> b (nested b1); arms a timer; b defers hold
    expect:
      config: [b1]
      esvs: { count: 0 }

  - send: { event: hold }        # deferred and held (must survive the round-trip)
    expect:
      config: [b1]
      esvs: { count: 0 }

  - send: { event: tick }
    expect:
      config: [b1]
      esvs: { count: 1 }

  # leaving b un-defers hold; it replays in `done` (+100). If the deferred set had not
  # survived the round-trips, the replay would be lost.
  - send: { event: release }
    expect:
      config: [done]
      esvs: { count: 101 }
