id: snap
events:
  enter: {}
  hold: {}
  release: {}
  tick: {}
top:
  esvs:
    count: { type: int, init: 0 }
  initial: { transition_to: a }
  states:
    a:
      on_events:
        enter: { transition_to: b }
    b:
      type: composite
      initial: { transition_to: b1 }
      defer: [hold]                                # hold is held while in b
      after:
        - { duration: 60s, transition_to: timedout }   # a pending timer in the snapshot
      on_events:
        release: { transition_to: done }
      states:
        b1:
          on_events:
            tick: { action: [ { assign: { count: "count + 1" } } ] }
    timedout: {}
    done:
      on_events:
        hold: { action: [ { assign: { count: "count + 100" } } ] }   # the replayed hold
