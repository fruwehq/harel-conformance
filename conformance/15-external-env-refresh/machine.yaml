id: extenv
events:
  noop: {}
top:
  esvs:
    token:   { type: string, external: true }   # host-seeded, read-only, retained
    applied: { type: string, init: null }
  on_events:
    env:                                          # reserved: host posts on external change
      - guard: "event.payload.changed.token != token"
        transition_to: reconfiguring
  initial: { transition_to: running }
  states:
    running:
      entry: [ { assign: { applied: "token" } } ]
    reconfiguring:
      entry:
        - refresh: { only: [token] }              # adopt the changed external value
        - assign: { applied: "token" }
