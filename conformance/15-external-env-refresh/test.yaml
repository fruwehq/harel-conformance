title: external esv is seeded once; an env change is reacted to and adopted via refresh
external: { token: "old" }          # host-seeded external esv on the root
steps:
  # creation: running.entry copied token into applied.
  # an env change to the SAME value -> guard false -> no transition.
  - send: { event: env, payload: { changed: { token: "old" } } }
    expect:
      config: [running]
      esvs: { token: "old", applied: "old" }

  # an env change to a NEW value -> guard true -> reconfiguring; refresh adopts the
  # new token into the (read-only) external esv, then applied is recomputed.
  - send: { event: env, payload: { changed: { token: "new" } } }
    expect:
      config: [reconfiguring]
      esvs: { token: "new", applied: "new" }
