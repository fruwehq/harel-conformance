title: guarded leaf transition — opens only with the right code
steps:
  # wrong code -> guard fails -> no transition.
  - send: { event: enter, payload: { code: "nope" } }
    expect:
      config: [locked]

  # correct code -> guard passes -> transition.
  - send: { event: enter, payload: { code: "open-sesame" } }
    expect:
      config: [open]

  # open has no handler for enter -> event discarded, state unchanged.
  - send: { event: enter, payload: { code: "open-sesame" } }
    expect:
      config: [open]
