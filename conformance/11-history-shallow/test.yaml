title: shallow history restores only the direct child (which then re-takes its initial)
steps:
  # creation: work -> outer -> s1.
  - send: { event: sub }          # s1 -> s2
    expect:
      config: [s2]

  - send: { event: pause }        # exit work (records shallow history: direct child = outer)
    expect:
      config: [paused]

  # shallow restores `outer`, then outer takes its own initial -> s1 (not the deep s2).
  - send: { event: resume }
    expect:
      config: [s1]
