id: shallowhist
events:
  sub: {}
  pause: {}
  resume: {}
top:
  initial: { transition_to: work }
  states:
    work:
      type: composite
      history: shallow
      initial: { transition_to: outer }
      on_events:
        pause: { transition_to: paused }
      states:
        outer:
          type: composite
          initial: { transition_to: s1 }
          states:
            s1:
              on_events:
                sub: { transition_to: s2 }
            s2: {}
    paused:
      on_events:
        resume: { transition_to: work }   # shallow history restores only the direct child
