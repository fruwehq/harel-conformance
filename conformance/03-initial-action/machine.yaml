id: initaction
events:
  go: {}
top:
  esvs:
    n: { type: int, init: 0 }
  initial: { transition_to: idle }
  states:
    idle:
      on_events:
        go: { transition_to: work }
    work:
      type: composite
      initial: { transition_to: step1, action: [ { assign: { n: "n + 1" } } ] }
      states:
        step1: {}
