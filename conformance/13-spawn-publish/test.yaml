title: spawn a child; child publishes to parent and terminates at its final state
steps:
  # start spawns a `child`; its deterministic id is root/1, captured into `last`.
  - send: { event: start }
    expect:
      spawned: [child]
      config: [idle]
      esvs: { last: "root/1" }
      instances:
        "root/1": { config: [run] }

  # drive the child to its final state: it publishes child_done -> parent, then
  # terminates (top reached final). The parent's handler bumps `finished`.
  - send: { instance: "root/1", event: go }
    expect:
      published: [child_done]
      config: [idle]
      esvs: { finished: 1 }
      instances:
        "root/1": { status: terminated }
