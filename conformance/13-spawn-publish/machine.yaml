id: parent
events:
  start: {}
  child_done: { payload: { id: { type: string } }, scope: local }
top:
  esvs:
    last:     { type: string, init: null }
    finished: { type: int,    init: 0 }
  on_events:
    child_done:
      action: [ { assign: { finished: "finished + 1" } } ]
  initial: { transition_to: idle }
  states:
    idle:
      on_events:
        start:
          action: [ { spawn: { def: child, result: last } } ]   # internal

---

id: child
events:
  go: {}
top:
  initial: { transition_to: run }
  states:
    run:
      on_events:
        go: { transition_to: fin }
    fin:
      type: final
      entry:
        - publish: { event: child_done, to: parent, payload: { id: "id" } }
