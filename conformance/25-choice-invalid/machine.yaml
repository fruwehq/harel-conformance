id: noelse
events:
  go: {}
top:
  esvs:
    x: { type: int, init: 1 }
  initial: { transition_to: a }
  states:
    a:
      on_events: { go: { transition_to: pick } }
    pick:
      choice:                      # no unguarded default (else) -> invalid (§5.5.1)
        - { guard: "x > 0", transition_to: b }
        - { guard: "x < 0", transition_to: c }
    b: {}
    c: {}
