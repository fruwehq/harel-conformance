title: esvs are hierarchically scoped — shadowing, and re-init on re-entry
steps:
  # inside leaf, x resolves to mid.x (10); bump writes the nearest x -> 11.
  - send: { event: bump }
    expect:
      config: [leaf]
      esvs: { x: 11 }

  # leave mid: mid.x is destroyed; x now resolves to the outer top.x, still 1
  # (the inner bumps never touched it — shadowing was in effect).
  - send: { event: leave }
    expect:
      config: [gone]
      esvs: { x: 1 }

  # re-enter mid: mid.x is re-initialized to 10 (not the prior 11).
  - send: { event: back }
    expect:
      config: [leaf]
      esvs: { x: 10 }

  - send: { event: bump }
    expect:
      config: [leaf]
      esvs: { x: 11 }
