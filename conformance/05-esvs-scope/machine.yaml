id: esvscope
events:
  bump: {}
  leave: {}
  back: {}
top:
  esvs:
    x: { type: int, init: 1 }        # outer x
  initial: { transition_to: mid }
  states:
    mid:
      type: composite
      esvs:
        x: { type: int, init: 10 }   # shadows top.x while mid is active
      initial: { transition_to: leaf }
      on_events:
        leave: { transition_to: gone }
      states:
        leaf:
          on_events:
            bump:
              action: [ { assign: { x: "x + 1" } } ]   # writes the nearest x (mid.x)
    gone:
      on_events:
        back: { transition_to: mid }
