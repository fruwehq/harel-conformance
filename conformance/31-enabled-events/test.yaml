title: enabled events from active configuration
steps:
  # Ancestor handlers are included; lifecycle handlers are excluded.
  - send: { event: reset }
    expect:
      config: [locked, red]
      enabled: [coin, reset, tick]

  # Enabled events are structural and guard-agnostic.
  - send: { event: coin, payload: { amount: 0 } }
    expect:
      config: [locked, red]
      enabled: [coin, reset, tick]

  # Leaf changes update the enabled set for that region.
  - send: { event: coin, payload: { amount: 100 } }
    expect:
      config: [red, unlocked]
      enabled: [push, reset, tick]

  # Orthogonal regions contribute the union of their active handlers.
  - send: { event: tick }
    expect:
      config: [green, unlocked]
      enabled: [push, reset, tock]

  # Ancestor reset returns both regions to their initial leaves.
  - send: { event: reset }
    expect:
      config: [locked, red]
      enabled: [coin, reset, tick]
