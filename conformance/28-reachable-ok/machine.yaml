id: reachable
events: { go: {} }
top:
  initial: { transition_to: outer }
  states:
    outer:                                   # composite; its child is reached via initial only
      initial: { transition_to: inner }
      states:
        inner: { on_events: { go: { transition_to: fin } } }
        fin: { type: final }                 # final reached via a transition
