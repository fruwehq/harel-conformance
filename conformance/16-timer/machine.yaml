id: timer
events:
  go: {}
  cancel: {}
top:
  esvs:
    fired: { type: int, init: 0 }
  initial: { transition_to: idle }
  states:
    idle:
      on_events:
        go: { transition_to: waiting }
    waiting:
      after:
        - duration: 30s
          transition_to: done
          action: [ { assign: { fired: "fired + 1" } } ]
      on_events:
        cancel: { transition_to: idle }   # exiting waiting cancels its timer
    done: {}
