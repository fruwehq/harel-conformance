title: after-timer fires via the virtual clock; exiting the state cancels it
steps:
  - send: { event: go }            # arm a 30s timer on entering waiting
    expect: { config: [waiting] }

  - send: { event: cancel }        # exit waiting -> timer cancelled
    expect: { config: [idle] }

  - advance: 60s                   # would have fired, but it was cancelled
    expect:
      config: [idle]
      esvs: { fired: 0 }

  - send: { event: go }            # re-arm a fresh 30s timer
    expect: { config: [waiting] }

  - advance: 30s                   # now due -> fires -> done
    expect:
      config: [done]
      esvs: { fired: 1 }
