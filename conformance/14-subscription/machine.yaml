id: hub
events:
  spawn2: {}
  ping: { scope: local }
  pong: { payload: { from: { type: string } }, scope: local }
top:
  esvs:
    pongs: { type: int, init: 0 }
  on_events:
    pong:
      action: [ { assign: { pongs: "pongs + 1" } } ]   # internal
  initial: { transition_to: ready }
  states:
    ready:
      on_events:
        spawn2:
          action:
            - spawn: { def: worker }
            - spawn: { def: worker }
        ping:
          action: [ { publish: { event: ping } } ]   # undirected -> subscribers in scope

---

id: worker
subscribe: [ping]                 # opt in to ping delivered over the bus
events:
  ping: { scope: local }
  pong: { payload: { from: { type: string } }, scope: local }
top:
  initial: { transition_to: w }
  states:
    w:
      on_events:
        ping:
          action: [ { publish: { event: pong, to: parent, payload: { from: "id" } } } ]
