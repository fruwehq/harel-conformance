title: undirected publish reaches subscribers in scope; directed reply goes to one
steps:
  # spawn two workers (root/1, root/2), each subscribed to ping.
  - send: { event: spawn2 }
    expect:
      spawned: [worker, worker]
      config: [ready]
      instances:
        "root/1": { config: [w] }
        "root/2": { config: [w] }

  # ping (sent to the hub) is republished undirected at `local` scope; both workers
  # are subscribers, so both receive it and each replies pong directed `to: parent`.
  # The hub does NOT subscribe to ping, so it does not loop on its own publish.
  - send: { event: ping }
    expect:
      published: [ping, pong, pong]
      config: [ready]
      esvs: { pongs: 2 }
