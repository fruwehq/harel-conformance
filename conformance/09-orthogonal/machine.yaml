id: ortho
events:
  both: {}
  x: {}
  y: {}
top:
  esvs:
    trail: { type: list, init: [] }
  initial: { transition_to: par }
  states:
    par:
      type: orthogonal
      on_events:
        done: { transition_to: finished }   # generated when all regions are final
      regions:
        - initial: { transition_to: r1a }
          states:
            r1a:
              on_events:
                both: { action: [ { assign: { trail: "trail + ['r1']" } } ] }
                x: { transition_to: r1done }
            r1done: { type: final }
        - initial: { transition_to: r2a }
          states:
            r2a:
              on_events:
                both: { action: [ { assign: { trail: "trail + ['r2']" } } ] }
                y: { transition_to: r2done }
            r2done: { type: final }
    finished: { type: final }
