title: orthogonal regions — broadcast in declared order; completion fires `done`
# On creation both regions initialize -> r1a, r2a.
steps:
  # `both` is offered to every region, in declared order (region 1 then region 2).
  - send: { event: both }
    expect:
      config: [r1a, r2a]
      esvs: { trail: [r1, r2] }

  # region 1 reaches its final; region 2 is unaffected; not all final -> no `done`.
  - send: { event: x }
    expect:
      config: [r1done, r2a]

  # region 2 reaches its final too -> all regions final -> `done` -> finished.
  - send: { event: y }
    expect:
      config: [finished]
