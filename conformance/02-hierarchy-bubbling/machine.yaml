id: bubbling
events:
  tick: {}
  reset: {}
top:
  initial: { transition_to: outer }
  states:
    outer:
      type: composite
      initial: { transition_to: a }
      on_events:
        reset: { transition_to: outer }   # handled at the composite, not the leaf
      states:
        a:
          on_events:
            tick: { transition_to: b }
        b: {}                              # b has no handler for reset
