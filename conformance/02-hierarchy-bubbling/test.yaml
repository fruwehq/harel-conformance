title: an event unhandled by the active leaf bubbles to an ancestor
steps:
  # tick is handled by leaf `a`.
  - send: { event: tick }
    expect:
      config: [b]

  # b has no handler for reset -> it bubbles up to `outer`, whose self-transition
  # exits and re-enters outer, taking its initial transition back to `a`.
  - send: { event: reset }
    expect:
      config: [a]
