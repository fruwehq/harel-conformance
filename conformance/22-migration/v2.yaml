id: m
version: 2
events:
  down: {}
  up: {}
migrations:
  - from: 1
    to: 2
    when: "state in ['online','offline']"
    state_map: { online: connected, offline: disconnected }
    esvs: [ { assign: { n: "n + 1000" } } ]
top:
  esvs:
    n: { type: int, init: 0 }
  initial: { transition_to: connected }
  states:
    connected:
      on_events:
        down: { transition_to: disconnected }
    disconnected:
      on_events:
        up: { transition_to: connected }
