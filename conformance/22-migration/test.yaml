title: a pinned v1 instance migrates to v2 at a safe point
# The root starts on v1 (the lowest version).
steps:
  - send: { event: down }        # v1: online -> offline
    expect:
      config: [offline]
      esvs: { n: 0 }

  # v2 becomes available; the instance is quiescent in `offline` (in the migration
  # domain), so it migrates: state_map remaps offline->disconnected, and the esvs
  # transform adds 1000.
  - upgrade: 2
    expect:
      config: [disconnected]
      esvs: { n: 1000 }

  - send: { event: up }          # now running v2
    expect:
      config: [connected]
