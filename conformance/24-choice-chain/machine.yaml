id: chain
events:
  go: { payload: { n: { type: int, required: true } } }
  reset: {}
top:
  esvs:
    n: { type: int, init: 0 }
  initial: { transition_to: start }
  states:
    start:
      on_events:
        go:
          action: [ { assign: { n: "event.payload.n" } } ]
          transition_to: c1
    c1:
      choice:
        - { guard: "n < 0", transition_to: negative }
        - { transition_to: c2 }        # else -> another choice
    c2:
      choice:
        - { guard: "n == 0", transition_to: zero }
        - { transition_to: positive }  # else
    negative:
      on_events: { reset: { transition_to: start } }
    zero:
      on_events: { reset: { transition_to: start } }
    positive:
      on_events: { reset: { transition_to: start } }
