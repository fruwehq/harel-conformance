title: deep history restores the full nested configuration
steps:
  # creation: work -> outer -> s1.
  - send: { event: sub }          # s1 -> s2
    expect:
      config: [s2]

  - send: { event: pause }        # exit work (records deep history: outer.s2)
    expect:
      config: [paused]

  - send: { event: resume }       # deep history restores outer.s2, not the initial s1
    expect:
      config: [s2]
