id: deadbranch
events: { check: { payload: { n: { type: int, required: true } } } }
top:
  initial: { transition_to: s }
  states:
    s:
      on_events:
        check:
          - { transition_to: a }                                 # unguarded default, NOT last
          - { guard: "event.payload.n > 0", transition_to: b }   # can never be selected
    a: {}
    b: {}
